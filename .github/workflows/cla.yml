name: CLA Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Verification
    runs-on: ubuntu-latest

    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],github-actions[bot]"
          remote-organization-name: ""
          remote-repository-name: ""
          create-file-commit-message: "$contributorName has signed the CLA"
          signed-commit-message: "CLA signed"
          custom-notsigned-prcomment: |
            ⚠️ CLA Required

            Please sign the Contributor License Agreement before we can review your PR.

            👉 Add this comment:
            ```
            I have read and agree to the Contributor License Agreement.
            ```

          custom-pr-sign-comment: |
            ✅ Thanks for signing the CLA!

          custom-allsigned-prcomment: |
            ✅ All contributors have signed the CLA.
