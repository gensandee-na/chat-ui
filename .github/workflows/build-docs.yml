name: Build documentation

on:
  push:
    branches:
      - main
      - v*-release

permissions:
  contents: read

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@093eb65f2e8745457987df060dc392e6bcf1347a
    with:
      commit_sha: ${{ github.sha }}
      package: chat-ui
      additional_args: --not_python_module
    secrets:
      token: ${{ secrets.HUGGINGFACE_PUSH }}
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
