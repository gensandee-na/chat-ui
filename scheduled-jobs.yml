name: Scheduled Automation

on:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: node dist/index.js
