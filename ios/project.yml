# XcodeGen project spec — run `xcodegen generate` from `ios/` to produce
# `HuggingChat.xcodeproj`. The generated project is intentionally not checked
# in: pbxproj is brittle in code review and merge conflicts. XcodeGen lets us
# describe the project declaratively and rebuild it deterministically.
#
# Install: `brew install xcodegen` (or `mint install yonaskolb/XcodeGen`).
name: HuggingChat
options:
  bundleIdPrefix: co.huggingface
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    OTHER_SWIFT_FLAGS: "-enable-upcoming-feature ExistentialAny"

targets:
  HuggingChat:
    type: application
    platform: iOS
    sources:
      - path: HuggingChat
        excludes:
          - "**/.DS_Store"
    info:
      path: HuggingChat/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.huggingface.chat
        PRODUCT_NAME: HuggingChat
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
    capabilities:
      - none
